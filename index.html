<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国語練習 － 第4〜6課（試験対策）</title>
<style>
  :root{
    --ink:#1b1712;
    --ink-2:#241f18;
    --paper:#f2e6c9;
    --paper-2:#e8d9ae;
    --seal:#b3382a;
    --seal-dark:#8c2a20;
    --gold:#c9a05c;
    --jade:#4f7a68;
    --jade-dark:#3c5f51;
    --muted:#8a7f6e;
    --ivory:#f0e6d2;
    --ink-text:#2b2118;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 8%, rgba(201,160,92,0.10), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(179,56,42,0.12), transparent 45%),
      var(--ink);
    color:var(--ivory);
    font-family:-apple-system, BlinkMacSystemFont, "Hiragino Sans", "PingFang SC", "Segoe UI", sans-serif;
    display:flex;
    justify-content:center;
    padding:28px 16px 70px;
  }
  .app{width:100%;max-width:540px;}

  header{text-align:center;margin-bottom:16px;}
  .eyebrow{font-size:11px;letter-spacing:.28em;color:var(--gold);text-transform:uppercase;margin-bottom:6px;}
  h1{
    font-family:"Songti SC","Hiragino Mincho ProN","Noto Serif SC",serif;
    font-weight:700;font-size:32px;margin:0 0 6px;color:var(--ivory);letter-spacing:.04em;
  }
  .sub{font-size:13px;color:var(--muted);}

  .chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:16px 0 8px;}
  .chip{
    border:1px solid rgba(201,160,92,0.4);background:transparent;color:var(--ivory);
    padding:7px 14px;border-radius:999px;font-size:13px;cursor:pointer;transition:all .15s ease;
  }
  .chip.on{background:var(--gold);border-color:var(--gold);color:var(--ink-text);font-weight:600;}

  .modes{display:grid;grid-template-columns:1fr 1fr;gap:6px;background:var(--ink-2);border-radius:12px;padding:4px;margin:14px 0 10px;}
  .modes button{
    border:none;background:transparent;color:var(--muted);
    padding:10px 4px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s ease;
  }
  .modes button.active{background:var(--seal);color:var(--ivory);}
  .modes button.wide{grid-column:1 / -1;}

  .type-input{
    width:100%;font-family:"Songti SC","Hiragino Mincho ProN","Noto Serif SC",serif;
    font-size:30px;text-align:center;padding:12px 14px;border-radius:14px;
    border:1.5px solid var(--paper-2);background:#fffdf6;color:var(--ink-text);
    outline:none;margin-top:10px;
  }
  .type-input:focus{border-color:var(--seal);}
  .type-input.ok{border-color:var(--jade);background:#eef6f1;}
  .type-input.ng{border-color:var(--seal);}
  .type-feedback{font-size:13px;margin-top:10px;min-height:18px;font-weight:600;}
  .type-solution{margin-top:8px;text-align:center;display:none;}
  .type-solution.show{display:block;}
  .type-solution .s-cn{font-family:"Songti SC","Noto Serif SC",serif;font-size:26px;font-weight:700;color:var(--jade);}
  .type-solution .s-py{font-family:ui-monospace,Menlo,monospace;font-style:italic;color:var(--muted);margin-top:2px;}

  .level{display:flex;gap:6px;justify-content:center;margin-bottom:16px;}
  .level button{
    border:1px solid rgba(201,160,92,0.35);background:transparent;color:var(--muted);
    padding:6px 16px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s ease;
  }
  .level button.on{background:var(--jade);border-color:var(--jade);color:#fff;}
  .level.hidden{display:none;}

  .weakbar{display:flex;gap:8px;justify-content:center;align-items:center;margin:-4px 0 16px;}
  .weak-toggle{
    border:1px solid rgba(179,56,42,0.5);background:transparent;color:var(--ivory);
    padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;gap:6px;transition:all .15s ease;
  }
  .weak-toggle.on{background:var(--seal);border-color:var(--seal);color:var(--ivory);}
  .weak-badge{background:rgba(255,255,255,0.16);border-radius:999px;padding:1px 8px;font-size:12px;min-width:22px;text-align:center;}
  .weak-toggle.on .weak-badge{background:rgba(0,0,0,0.28);}
  .weak-reset{border:none;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline;}
  .weak-reset.hidden{display:none;}
  .weak-list-btn{border:1px solid rgba(201,160,92,0.4);background:transparent;color:var(--ivory);padding:7px 12px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;}
  .weak-list-btn:active{transform:scale(.97);}
  .seg{display:flex;gap:4px;background:var(--ink-2);border-radius:999px;padding:3px;}
  .seg button{border:none;background:transparent;color:var(--muted);padding:7px 11px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s ease;}
  .seg button.on{background:var(--seal);color:var(--ivory);}
  .seg-badge{background:rgba(255,255,255,0.16);border-radius:999px;padding:0 6px;font-size:11px;min-width:18px;text-align:center;}
  .seg button.on .seg-badge{background:rgba(0,0,0,0.28);}

  /* ===== 苦手一覧オーバーレイ ===== */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:none;justify-content:center;align-items:flex-end;z-index:50;}
  .overlay.show{display:flex;}
  .sheet{width:100%;max-width:540px;max-height:88vh;background:var(--ink-2);border-radius:20px 20px 0 0;display:flex;flex-direction:column;box-shadow:0 -10px 40px rgba(0,0,0,0.5);}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 12px;border-bottom:1px solid rgba(201,160,92,0.2);}
  .sheet-head h2{margin:0;font-size:18px;color:var(--ivory);font-family:"Songti SC","Noto Serif SC",serif;}
  .sheet-head h2 span{color:var(--gold);font-size:14px;font-family:inherit;}
  .sheet-close{border:none;background:transparent;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;}
  .sheet-body{overflow-y:auto;padding:8px 14px 4px;flex:1;}
  .sheet-foot{padding:12px 16px 18px;border-top:1px solid rgba(201,160,92,0.2);}
  .wl-group-h{font-size:12px;letter-spacing:.15em;color:var(--gold);margin:14px 6px 6px;text-transform:uppercase;}
  .wl-row{display:flex;align-items:center;gap:10px;background:var(--ink);border:1px solid rgba(201,160,92,0.18);border-radius:12px;padding:10px 12px;margin-bottom:7px;}
  .wl-info{flex:1;min-width:0;}
  .wl-main{font-family:"Songti SC","Noto Serif SC",serif;font-size:19px;font-weight:700;color:var(--ivory);}
  .wl-sub{font-size:12px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .wl-meta{font-size:11px;color:var(--jade);margin-top:3px;}
  .wl-tag{font-size:10px;color:var(--muted);border:1px solid rgba(201,160,92,0.3);border-radius:999px;padding:1px 7px;white-space:nowrap;}
  .wl-del{border:none;background:rgba(179,56,42,0.85);color:#fff;border-radius:8px;width:30px;height:30px;font-size:15px;cursor:pointer;flex-shrink:0;}
  .wl-del:active{transform:scale(.9);}
  .wl-empty{text-align:center;color:var(--muted);padding:40px 10px;}

  .stage{position:relative;perspective:1200px;margin-bottom:16px;min-height:300px;}

  /* ===== card / flashcard ===== */
  .card{
    position:relative;background:var(--paper);color:var(--ink-text);
    border-radius:26px 26px 14px 14px;border:1px solid var(--paper-2);
    box-shadow:0 18px 40px rgba(0,0,0,0.35), inset 0 0 0 6px rgba(255,255,255,0.15);
    min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:34px 24px;text-align:center;transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.2,.8,.2,1);
  }
  .card.clickable{cursor:pointer;}
  .card.flipped{transform:rotateY(180deg);}
  .face{backface-visibility:hidden;position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:34px 24px;}
  .face.back{transform:rotateY(180deg);}
  .lesson-tag{position:absolute;top:14px;left:16px;font-size:11px;color:var(--muted);border:1px solid var(--paper-2);padding:2px 8px;border-radius:999px;}
  .prompt-label{position:absolute;top:14px;right:16px;font-size:11px;color:var(--seal-dark);font-weight:700;letter-spacing:.05em;}

  .hanzi{font-family:"Songti SC","Hiragino Mincho ProN","Noto Serif SC",serif;font-size:54px;font-weight:700;line-height:1.1;margin-bottom:14px;}
  .pinyin{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-style:italic;font-size:20px;color:var(--seal-dark);margin-bottom:6px;line-height:1.4;}
  .jp-prompt{font-size:22px;font-weight:600;line-height:1.5;}
  .meaning{font-size:20px;font-weight:600;line-height:1.4;}
  .hint{font-size:12px;color:var(--muted);margin-top:16px;}
  .prompt-py{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-style:italic;font-size:18px;color:var(--seal-dark);line-height:1.5;}

  /* ===== quiz choices ===== */
  .choices{display:grid;gap:10px;margin-top:16px;}
  .choice{
    background:var(--ink-2);border:1px solid rgba(201,160,92,0.25);color:var(--ivory);
    border-radius:14px;padding:15px 16px;font-size:17px;text-align:left;cursor:pointer;transition:all .15s ease;
    font-family:"Songti SC","Hiragino Mincho ProN","Noto Serif SC",serif;
    display:flex;align-items:center;gap:12px;
  }
  .choice .num{
    flex-shrink:0;width:24px;height:24px;border-radius:7px;background:rgba(201,160,92,0.22);
    color:var(--gold);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;
    font-family:ui-monospace,Menlo,monospace;
  }
  .choice.correct .num,.choice.wrong .num{background:rgba(255,255,255,0.22);color:#fff;}
  .choice:active{transform:scale(.98);}
  .choice.correct{background:var(--jade);border-color:var(--jade);color:#fff;}
  .choice.wrong{background:var(--seal-dark);border-color:var(--seal-dark);color:#fff;opacity:.9;}
  .choice.dim{opacity:.4;}

  /* ===== reorder ===== */
  .reorder-prompt{background:var(--paper);color:var(--ink-text);border-radius:18px;padding:18px 18px 14px;text-align:center;margin-bottom:14px;position:relative;border:1px solid var(--paper-2);}
  .reorder-ja{font-size:19px;font-weight:600;line-height:1.5;}
  .reorder-answer{
    min-height:64px;background:rgba(240,230,210,0.06);border:1.5px dashed rgba(201,160,92,0.4);
    border-radius:14px;padding:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start;margin-bottom:12px;
  }
  .reorder-answer.empty::before{content:"ここに語を並べる";color:var(--muted);font-size:13px;align-self:center;margin:auto;}
  .reorder-answer.ok{border-color:var(--jade);border-style:solid;background:rgba(79,122,104,0.12);}
  .reorder-answer.ng{border-color:var(--seal);border-style:solid;}
  .reorder-bank{display:flex;flex-wrap:wrap;gap:8px;min-height:44px;padding:4px 0;}
  .tile{
    font-family:"Songti SC","Hiragino Mincho ProN","Noto Serif SC",serif;
    background:var(--gold);color:var(--ink-text);border:none;border-radius:10px;
    padding:11px 15px;font-size:19px;font-weight:600;cursor:pointer;transition:transform .1s ease, opacity .1s ease;
    box-shadow:0 3px 0 rgba(0,0,0,0.25);
  }
  .tile:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,0.25);}
  .tile.in-answer{background:var(--paper);}
  .reorder-solution{margin-top:8px;font-size:15px;color:var(--ivory);text-align:center;display:none;}
  .reorder-solution.show{display:block;}
  .reorder-solution .sol-cn{font-family:"Songti SC","Noto Serif SC",serif;font-size:20px;font-weight:700;color:var(--jade);}
  .reorder-solution .sol-py{font-family:ui-monospace,Menlo,monospace;font-style:italic;font-size:14px;color:var(--muted);margin-top:2px;}

  /* ===== controls ===== */
  .controls{display:flex;gap:10px;margin-top:14px;}
  .btn{flex:1;border:none;border-radius:14px;padding:14px 0;font-size:14px;font-weight:700;cursor:pointer;transition:transform .1s ease;}
  .btn:active{transform:scale(.97);}
  .btn.primary{background:var(--seal);color:var(--ivory);}
  .btn.ghost{background:transparent;border:1px solid rgba(201,160,92,0.4);color:var(--ivory);}
  .btn.next{background:var(--gold);color:var(--ink-text);}
  .btn:disabled{opacity:.4;cursor:default;}

  footer{margin-top:24px;}
  .score-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px;color:var(--muted);}
  .likes{display:flex;align-items:center;gap:6px;color:var(--gold);font-weight:700;}
  .stamps{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;padding:10px;background:rgba(0,0,0,0.2);border-radius:14px;}
  .dot{width:11px;height:11px;border-radius:50%;background:rgba(201,160,92,0.18);}
  .dot.on{background:var(--seal);}

  .shake{animation:shake .4s ease;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(7px);}60%{transform:translateX(-5px);}80%{transform:translateX(4px);}}
  .empty-note{text-align:center;color:var(--muted);padding:40px 10px;}
  @media (prefers-reduced-motion: reduce){.card,.shake{animation:none !important;transition:none !important;}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow">Exam Practice</div>
    <h1>中国語練習</h1>
    <div class="sub">第4〜6課 試験対策（故宮・点赞・追剧）</div>
  </header>

  <div class="chips" id="chips"></div>

  <div class="modes">
    <button data-mode="pin" class="active">拼音 → 中国語</button>
    <button data-mode="jp">日本語 → 中国語</button>
    <button data-mode="reorder">並べ替え</button>
    <button data-mode="flash">フラッシュカード</button>
    <button data-mode="type">単語タイピング</button>
    <button data-mode="types">文タイピング</button>
  </div>

  <div class="level" id="levelToggle">
    <button data-level="word" class="on">単語</button>
    <button data-level="sentence">文</button>
  </div>

  <div class="weakbar">
    <div class="seg" id="filterSeg">
      <button data-filter="all" class="on">すべて</button>
      <button data-filter="weaknew">苦手＋未 <span class="seg-badge" id="badgeWeaknew">0</span></button>
      <button data-filter="weak">苦手のみ <span class="seg-badge" id="badgeWeak">0</span></button>
    </div>
    <button class="weak-list-btn" id="weakListBtn">📋 一覧</button>
  </div>

  <div class="stage" id="stage"></div>

  <div class="controls" id="controls"></div>

  <footer>
    <div class="score-row">
      <span id="progress">0 / 0</span>
      <span class="likes">👍 <span id="score">0</span></span>
    </div>
    <div class="stamps" id="stampStrip"></div>
  </footer>
</div>

<div class="overlay" id="weakOverlay">
  <div class="sheet">
    <div class="sheet-head">
      <h2>苦手リスト <span id="weakCount"></span></h2>
      <button class="sheet-close" id="weakClose">✕</button>
    </div>
    <div class="sheet-body" id="weakListBody"></div>
    <div class="sheet-foot" style="display:flex;gap:8px;">
      <button class="btn ghost" id="weakClearAll">苦手をリセット</button>
      <button class="btn ghost" id="weakClearKnown">覚えたをリセット</button>
    </div>
  </div>
</div>

/* ============== STATE ============== */
let selectedLessons = new Set([4,5,6]);
let mode = "pin";       // pin | jp | reorder | flash
let level = "word";     // word | sentence  (for pin/jp)
let pool = [];
let queue = [];
let qi = 0;
let score = 0;
let stampGoal = 12;
let stampsOn = 0;
let answered = false;

const chipsEl = document.getElementById("chips");
const stageEl = document.getElementById("stage");
const controlsEl = document.getElementById("controls");
const levelEl = document.getElementById("levelToggle");
const progressEl = document.getElementById("progress");
const scoreEl = document.getElementById("score");
const stampStripEl = document.getElementById("stampStrip");
const filterSegEl = document.getElementById("filterSeg");
const badgeWeaknewEl = document.getElementById("badgeWeaknew");
const badgeWeakEl = document.getElementById("badgeWeak");

/* ============== 苦手 / 覚えた ログ（モード別） ============== */
const WEAK_KEY = "ch_practice_weak_v2";
const KNOWN_KEY = "ch_practice_known_v1";
const MODE_KEYS = ["pin","jp","reorder","flash","type","types"];
const MODE_NAMES = {pin:"拼音→中国語", jp:"日本語→中国語", reorder:"並べ替え", flash:"フラッシュカード", type:"単語タイピング", types:"文タイピング"};
let filterMode = "all";   // all | weaknew(苦手+未) | weak(苦手のみ)
let weakLog = {};   // mode -> { id -> {m:誤答数, s:連続正解数} }
let knownLog = {};  // mode -> { id -> true }  ＝覚えた
function loadWeak(){
  try{ weakLog = JSON.parse(localStorage.getItem(WEAK_KEY)) || {}; }catch(e){ weakLog = {}; }
  try{ knownLog = JSON.parse(localStorage.getItem(KNOWN_KEY)) || {}; }catch(e){ knownLog = {}; }
  MODE_KEYS.forEach(k=>{
    if(!weakLog[k] || typeof weakLog[k] !== "object") weakLog[k] = {};
    if(!knownLog[k] || typeof knownLog[k] !== "object") knownLog[k] = {};
  });
}
function saveWeak(){ try{ localStorage.setItem(WEAK_KEY, JSON.stringify(weakLog)); localStorage.setItem(KNOWN_KEY, JSON.stringify(knownLog)); }catch(e){} }
function itemId(it){ return it.h!==undefined ? "w:"+it.h : "s:"+it.cn; }
function isWeak(it){ const l = weakLog[mode]; return !!(l && l[itemId(it)]); }
function isKnown(it){ const l = knownLog[mode]; return !!(l && l[itemId(it)]); }
function setKnown(id, on){ const l = knownLog[mode] || (knownLog[mode] = {}); if(on) l[id] = true; else delete l[id]; }
function recordResult(it, correct){
  const wl = weakLog[mode] || (weakLog[mode] = {}); const id = itemId(it);
  if(correct){
    if(wl[id]){ wl[id].s = (wl[id].s||0) + 1; if(wl[id].s >= 2){ delete wl[id]; setKnown(id, true); } }  // 苦手→2連続正解で覚えた
    else { setKnown(id, true); }                                                                        // 未→正解で覚えた
  } else {
    setKnown(id, false);                        // 間違えたら覚えた解除
    if(!wl[id]) wl[id] = {m:0,s:0};
    wl[id].m++; wl[id].s = 0;
  }
  saveWeak();
  updateFilterCounts();
}
function markKnown(it){ const id = itemId(it); const wl = weakLog[mode]; if(wl) delete wl[id]; setKnown(id, true); saveWeak(); updateFilterCounts(); }
function updateFilterCounts(){
  const base = basePool();
  if(badgeWeakEl) badgeWeakEl.textContent = base.filter(isWeak).length;
  if(badgeWeaknewEl) badgeWeaknewEl.textContent = base.filter(it=>!isKnown(it)).length;
}

/* ---- 苦手一覧 ---- */
const weakOverlayEl = document.getElementById("weakOverlay");
const weakListBodyEl = document.getElementById("weakListBody");
const weakCountEl = document.getElementById("weakCount");
function resolveWeak(id){
  if(id.slice(0,2)==="w:"){ const h=id.slice(2); const w=WORDS.find(x=>x.h===h); return w?{main:w.h,sub:w.p+" ・ "+w.m,l:w.l,kind:"単語"}:{main:h,sub:"",l:"?",kind:"単語"}; }
  const cn=id.slice(2); const s=SENTENCES.find(x=>x.cn===cn); return s?{main:s.cn,sub:s.py+" ／ "+s.ja,l:s.l,kind:"文"}:{main:cn,sub:"",l:"?",kind:"文"};
}
function renderWeakList(){
  const log = weakLog[mode] || {};
  const ids = Object.keys(log);
  const knownN = Object.keys(knownLog[mode] || {}).length;
  weakCountEl.textContent = "／ " + MODE_NAMES[mode] + "（苦手 " + ids.length + "・覚えた " + knownN + "）";
  if(ids.length===0){ weakListBodyEl.innerHTML = '<div class="wl-empty">この出題形式ではまだ苦手はありません 🎉<br>間違えた問題がここに集まります。</div>'; return; }
  const rows = ids.map(id=>({id, ...resolveWeak(id), rec:log[id]}));
  rows.sort((a,b)=> (a.l===b.l ? (b.rec.m||0)-(a.rec.m||0) : (a.l>b.l?1:-1)) );
  let html = ""; let curL = null;
  rows.forEach(r=>{
    if(r.l!==curL){ curL=r.l; html += '<div class="wl-group-h">第'+curL+'課</div>'; }
    const streak = r.rec.s||0;
    html +=
      '<div class="wl-row">'+
        '<span class="wl-tag">'+r.kind+'</span>'+
        '<div class="wl-info">'+
          '<div class="wl-main">'+r.main+'</div>'+
          (r.sub?'<div class="wl-sub">'+r.sub+'</div>':'')+
          '<div class="wl-meta">誤答 '+(r.rec.m||0)+'回 ・ 卒業まであと '+(2-streak)+'回正解</div>'+
        '</div>'+
        '<button class="wl-del" data-id="'+encodeURIComponent(r.id)+'" title="削除">✕</button>'+
      '</div>';
  });
  weakListBodyEl.innerHTML = html;
  weakListBodyEl.querySelectorAll(".wl-del").forEach(b=>{
    b.onclick = ()=>{ const id=decodeURIComponent(b.dataset.id); delete log[id]; saveWeak(); renderWeakList(); updateFilterCounts(); };
  });
}
function openWeakList(){ renderWeakList(); weakOverlayEl.classList.add("show"); }
function closeWeakList(){ weakOverlayEl.classList.remove("show"); rebuild(); }

/* ============== UTIL ============== */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function sample(arr,n,excludeFn){
  return shuffle(arr.filter(x=>!excludeFn(x))).slice(0,n);
}

/* ============== CHIPS ============== */
function buildChips(){
  chipsEl.innerHTML = "";
  [4,5,6].forEach(l=>{
    const b = document.createElement("button");
    b.className = "chip" + (selectedLessons.has(l) ? " on" : "");
    b.textContent = "第" + l + "課";
    b.onclick = ()=>{
      if(selectedLessons.has(l)){ if(selectedLessons.size>1) selectedLessons.delete(l); }
      else selectedLessons.add(l);
      buildChips();
      rebuild();
    };
    chipsEl.appendChild(b);
  });
}

/* ============== POOL ============== */
function basePool(){
  if(mode==="reorder") return SENTENCES.filter(d=>selectedLessons.has(d.l) && d.tokens);
  if(mode==="type") return WORDS.filter(d=>selectedLessons.has(d.l) && !/[～~]/.test(d.h));
  if(mode==="types") return SENTENCES.filter(d=>selectedLessons.has(d.l));
  if(mode==="flash" || level==="word") return WORDS.filter(d=>selectedLessons.has(d.l));
  return SENTENCES.filter(d=>selectedLessons.has(d.l));
}
function applyFilter(p){
  if(filterMode==="weak") return p.filter(isWeak);
  if(filterMode==="weaknew") return p.filter(it=>!isKnown(it));   // 苦手＋未（覚えた以外）
  return p;
}
function rebuild(){
  pool = applyFilter(basePool());
  queue = shuffle(pool);
  qi = 0; score = 0; stampsOn = 0;
  stampGoal = Math.min(12, Math.max(1,pool.length));
  buildStampStrip();
  updateScore();
  updateFilterCounts();
  render();
}

function buildStampStrip(){
  stampStripEl.innerHTML = "";
  for(let i=0;i<stampGoal;i++){const d=document.createElement("div");d.className="dot";stampStripEl.appendChild(d);}
}
function lightStamp(){
  const dots = stampStripEl.children;
  const idx = stampsOn % stampGoal;
  if(dots[idx]) dots[idx].classList.add("on");
  stampsOn++;
}
function updateScore(){
  progressEl.textContent = (pool.length? (qi % pool.length) : 0) + " / " + pool.length;
  scoreEl.textContent = score;
}
function current(){ return queue.length ? queue[qi % queue.length] : null; }
function advance(){
  qi++;
  if(pool.length && qi % pool.length === 0){ pool = applyFilter(basePool()); queue = shuffle(pool); qi = 0; }  // 周回ごとに再計算＝覚えた語が抜ける
  render();
}

/* ============== RENDER DISPATCH ============== */
let activeKeyHandler = null;
function setKeyHandler(fn){
  if(activeKeyHandler){ document.removeEventListener("keydown", activeKeyHandler); activeKeyHandler = null; }
  if(fn){ activeKeyHandler = fn; document.addEventListener("keydown", fn); }
}
function render(){
  answered = false;
  setKeyHandler(null);
  levelEl.classList.toggle("hidden", mode==="reorder" || mode==="flash" || mode==="type" || mode==="types");
  stageEl.innerHTML = "";
  controlsEl.innerHTML = "";
  const item = current();
  if(!item){
    let msg;
    if(filterMode==="weak") msg = '🎉 この形式に苦手はありません。<br>フィルターを「すべて」に戻そう。';
    else if(filterMode==="weaknew") msg = '🎉 全部「覚えた」！苦手・未学習は残っていません。<br>フィルターを「すべて」に戻せます。';
    else msg = 'この範囲に問題がありません。<br>課を選び直してください。';
    stageEl.innerHTML = '<div class="empty-note">'+msg+'</div>';
    updateScore(); return;
  }
  updateScore();
  if(mode==="flash") renderFlash(item);
  else if(mode==="reorder") renderReorder(item);
  else if(mode==="type") renderType(item);
  else if(mode==="types") renderTypeSentence(item);
  else renderQuiz(item);
}

/* ============== FLASHCARD ============== */
function renderFlash(item){
  const card = document.createElement("div");
  card.className = "card clickable";
  card.innerHTML =
    '<div class="lesson-tag">第'+item.l+'課</div>'+
    '<div class="face front"><div class="hanzi">'+item.h+'</div><div class="hint">タップして裏返す</div></div>'+
    '<div class="face back"><div class="pinyin">'+item.p+'</div><div class="meaning">'+item.m+'</div></div>';
  let flipped=false;
  card.onclick = ()=>{ flipped=!flipped; card.classList.toggle("flipped",flipped); };
  stageEl.appendChild(card);

  const again = mkBtn("もう一度","btn ghost",()=>{ recordResult(item,false); const it=queue[qi%queue.length]; queue.splice((qi%queue.length)+1,0,it); qi++; render(); });
  const known = mkBtn("覚えた 👍","btn primary",()=>{ markKnown(item); score++; lightStamp(); updateScore(); setTimeout(advance,250); });
  controlsEl.append(again,known);
}

/* ============== TYPING (意味 → 入力, 暗記用: 単語 / 文 共通) ============== */
const normWord = s => (s||"").replace(/\s+/g,"");
const normSentence = s => (s||"").replace(/[\s。，、！？；：·…—～~"“”‘’（）()《》〈〉「」『』.,!?;:]/g,"");
function renderType(item){ renderTyping(item, {label:"意味 → 中国語入力", prompt:item.m, answer:item.h, solMain:item.h, solPy:item.p, placeholder:"簡体字を入力", norm:normWord}); }
function renderTypeSentence(item){ renderTyping(item, {label:"意味 → 文を入力", prompt:item.ja, answer:item.cn, solMain:item.cn, solPy:item.py, placeholder:"簡体字で文を入力（句読点は省略可）", norm:normSentence}); }

function renderTyping(item, cfg){
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML =
    '<div class="lesson-tag">第'+item.l+'課</div>'+
    '<div class="prompt-label">'+cfg.label+'</div>'+
    '<div class="face" style="position:relative;">'+
      '<div class="jp-prompt">'+cfg.prompt+'</div>'+
      '<input class="type-input" id="typeInput" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="'+cfg.placeholder+'">'+
      '<div class="type-feedback" id="typeFb"></div>'+
      '<div class="type-solution" id="typeSol"><div class="s-cn">'+cfg.solMain+'</div><div class="s-py">'+cfg.solPy+'</div></div>'+
    '</div>';
  stageEl.appendChild(card);

  const input = card.querySelector("#typeInput");
  const fb = card.querySelector("#typeFb");
  const sol = card.querySelector("#typeSol");
  let wrongAttempt = false, done = false, composing = false;
  const target = cfg.norm(cfg.answer);

  input.addEventListener("compositionstart", ()=>composing=true);
  input.addEventListener("compositionend", ()=>composing=false);

  function submit(){
    if(done) return;
    const val = cfg.norm(input.value);
    if(!val) return;
    if(val === target){
      done = true;
      input.classList.remove("ng"); input.classList.add("ok"); input.disabled = true;
      const clean = !wrongAttempt;
      if(clean){ score++; lightStamp(); recordResult(item, true); }  // ノーミス正解のみ加点・卒業カウント
      updateScore();
      sol.classList.add("show");
      fb.textContent = clean ? "正解！🎉" : "正解！（次はノーミスを狙おう）";
      fb.style.color = "var(--jade-dark)";
      controlsEl.innerHTML = "";
      const nb = mkBtn("次へ","btn next",advance);
      controlsEl.append(nb);
      setTimeout(()=>nb.focus(), 0);
    } else {
      if(!wrongAttempt){ wrongAttempt = true; recordResult(item, false); }  // 初回ミスで苦手登録
      input.classList.add("ng");
      card.classList.add("shake"); setTimeout(()=>card.classList.remove("shake"), 400);
      fb.textContent = "ちがうよ、もう一度！";
      fb.style.color = "var(--seal-dark)";
      input.select();
    }
  }

  function skip(){
    if(done) return;
    done = true;
    if(!wrongAttempt){ recordResult(item, false); }  // 分からず飛ばした → 苦手に登録
    input.disabled = true; input.classList.remove("ok");
    sol.classList.add("show");
    fb.textContent = "スキップ（苦手に登録）";
    fb.style.color = "var(--muted)";
    controlsEl.innerHTML = "";
    const nb = mkBtn("次へ","btn next",advance);
    controlsEl.append(nb);
    setTimeout(()=>nb.focus(), 0);
  }

  input.addEventListener("keydown", (e)=>{
    if(e.key === "Enter" && !e.isComposing && !composing){ e.preventDefault(); submit(); }
  });
  controlsEl.innerHTML = "";
  controlsEl.append(mkBtn("確認","btn primary",submit), mkBtn("スキップ","btn ghost",skip));
  setTimeout(()=>input.focus(), 0);
}

/* ============== QUIZ (pin / jp, word / sentence) ============== */
function renderQuiz(item){
  const isWord = level==="word";
  const card = document.createElement("div");
  card.className = "card";
  const label = mode==="pin" ? "拼音 → 中国語" : "日本語 → 中国語";
  let promptHtml;
  if(mode==="pin"){
    promptHtml = isWord ? '<div class="pinyin">'+item.p+'</div>' : '<div class="prompt-py">'+item.py+'</div>';
  } else {
    promptHtml = '<div class="jp-prompt">'+ (isWord? item.m : item.ja) +'</div>';
  }
  card.innerHTML =
    '<div class="lesson-tag">第'+item.l+'課</div>'+
    '<div class="prompt-label">'+label+'</div>'+
    '<div class="face" style="position:relative;">'+promptHtml+
      '<div class="choices" id="choices"></div>'+
    '</div>';
  stageEl.appendChild(card);

  const correct = isWord ? item.h : item.cn;
  const key = isWord ? "h" : "cn";
  const distractors = sample(pool, 3, d=> d[key]===correct).map(d=>d[key]);
  const options = shuffle([correct, ...distractors]);
  const choicesEl = card.querySelector("#choices");
  options.forEach((opt,i)=>{
    const b = document.createElement("button");
    b.className = "choice";
    b.dataset.opt = opt;
    b.innerHTML = '<span class="num">'+(i+1)+'</span><span class="opt-text"></span>';
    b.querySelector(".opt-text").textContent = opt;
    b.onclick = ()=>selectChoice(b, opt, correct, choicesEl, card, item);
    choicesEl.appendChild(b);
  });
  // キーボード操作: 1〜4で選択、回答後は Enter / → / Space で次へ
  setKeyHandler((e)=>{
    if(e.isComposing) return;
    if(!answered){
      const n = parseInt(e.key,10);
      if(n>=1 && n<=options.length){ e.preventDefault(); const b=choicesEl.children[n-1]; selectChoice(b, b.dataset.opt, correct, choicesEl, card, item); }
    } else if(e.key==="Enter" || e.key===" " || e.key==="ArrowRight"){ e.preventDefault(); advance(); }
  });
}

function selectChoice(btn, chosen, correct, choicesEl, card, item){
  if(answered) return;
  answered = true;
  choicesEl.querySelectorAll(".choice").forEach(b=>{
    if(b.dataset.opt===correct) b.classList.add("correct");
    else b.classList.add("dim");
  });
  if(chosen===correct){ score++; lightStamp(); }
  else{ btn.classList.remove("dim"); btn.classList.add("wrong"); card.classList.add("shake"); setTimeout(()=>card.classList.remove("shake"),400); }
  recordResult(item, chosen===correct);
  updateScore();
  const next = mkBtn("次へ","btn next",advance);
  controlsEl.innerHTML="";
  controlsEl.append(next);
}

/* ============== REORDER (tiles) ============== */
function renderReorder(item){
  const tokens = item.tokens;
  const wrap = document.createElement("div");

  const prompt = document.createElement("div");
  prompt.className="reorder-prompt";
  prompt.innerHTML = '<div class="lesson-tag">第'+item.l+'課</div><div class="reorder-ja">'+item.ja+'</div>';

  const answer = document.createElement("div");
  answer.className="reorder-answer empty";

  const bank = document.createElement("div");
  bank.className="reorder-bank";

  const solution = document.createElement("div");
  solution.className="reorder-solution";
  solution.innerHTML = '<div class="sol-cn">'+item.cn+'</div><div class="sol-py">'+item.py+'</div>';

  wrap.append(prompt, answer, bank, solution);
  stageEl.appendChild(wrap);

  const order = shuffle(tokens.map((t,i)=>({t,i})));
  // ensure not already in correct order
  if(order.map(o=>o.t).join("")===tokens.join("") && tokens.length>1){ order.push(order.shift()); }

  function syncEmpty(){ answer.classList.toggle("empty", answer.children.length===0); }

  order.forEach(o=>{
    const tile = document.createElement("button");
    tile.className="tile";
    tile.textContent=o.t;
    tile.onclick=()=>{
      if(answered) return;
      if(tile.parentElement===bank){ tile.classList.add("in-answer"); answer.appendChild(tile); }
      else { tile.classList.remove("in-answer"); bank.appendChild(tile); }
      syncEmpty();
    };
    bank.appendChild(tile);
  });
  syncEmpty();

  const check = mkBtn("確認","btn primary",()=>{
    if(answered) return;
    const built = Array.from(answer.children).map(c=>c.textContent).join("");
    const correct = tokens.join("");
    answered = true;
    if(built===correct){ answer.classList.add("ok"); score++; lightStamp(); }
    else { answer.classList.add("ng"); wrap.classList.add("shake"); setTimeout(()=>wrap.classList.remove("shake"),400); }
    recordResult(item, built===correct);
    solution.classList.add("show");
    updateScore();
    controlsEl.innerHTML="";
    controlsEl.append(mkBtn("次へ","btn next",advance));
  });
  const reset = mkBtn("リセット","btn ghost",()=>{
    if(answered) return;
    Array.from(answer.children).forEach(c=>{ c.classList.remove("in-answer"); bank.appendChild(c); });
    syncEmpty();
  });
  controlsEl.append(reset, check);
}

/* ============== helpers ============== */
function mkBtn(text,cls,fn){ const b=document.createElement("button"); b.className=cls; b.textContent=text; b.onclick=fn; return b; }

/* ============== MODE / LEVEL SWITCH ============== */
document.querySelectorAll(".modes button").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".modes button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    mode = b.dataset.mode;
    rebuild();
  };
});
document.querySelectorAll(".level button").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".level button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    level = b.dataset.level;
    rebuild();
  };
});

filterSegEl.querySelectorAll("button").forEach(b=>{
  b.onclick = ()=>{
    filterSegEl.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    filterMode = b.dataset.filter;
    rebuild();
  };
});
document.getElementById("weakListBtn").onclick = openWeakList;
document.getElementById("weakClose").onclick = closeWeakList;
weakOverlayEl.onclick = (e)=>{ if(e.target===weakOverlayEl) closeWeakList(); };
document.getElementById("weakClearAll").onclick = ()=>{
  if(confirm("この出題形式（"+MODE_NAMES[mode]+"）の苦手をリセットしますか？")){ weakLog[mode] = {}; saveWeak(); renderWeakList(); updateFilterCounts(); }
};
document.getElementById("weakClearKnown").onclick = ()=>{
  if(confirm("この出題形式（"+MODE_NAMES[mode]+"）の覚えたをリセットしますか？")){ knownLog[mode] = {}; saveWeak(); renderWeakList(); updateFilterCounts(); }
};

/* ============== INIT ============== */
loadWeak();
buildChips();
rebuild();
</script>
